  <title>カタカナ マスター</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      min-height: 100%;
    }
    body {
      font-family:
        "Noto Sans KR",
        "Noto Sans JP",
        "Apple SD Gothic Neo",
        "Hiragino Sans",
        "Malgun Gothic",
        "Yu Gothic",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }
  </style>

<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{background:#000;min-height:100vh;font-family:sans-serif;color:#fff;max-width:430px;margin:0 auto;padding:16px 16px 80px}
.neon-title{text-align:center;font-size:20px;font-weight:500;color:#0ff;text-shadow:0 0 8px #0ff;margin-bottom:16px;letter-spacing:2px}
.tab-bar{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px;background:#111;border:1px solid #333;border-radius:8px;color:#888;font-size:13px;cursor:pointer}
.tab-btn.active{background:#001a1a;border-color:#0ff;color:#0ff}
.mode-bar{display:flex;gap:8px;margin-bottom:16px}
.mode-btn{flex:1;padding:9px;background:#111;border:1px solid #333;border-radius:8px;color:#aaa;font-size:12px;cursor:pointer}
.mode-btn.active{background:#1a0030;border-color:#c0f;color:#c0f}
.flash-card{background:#0a0a0a;border:1px solid #222;border-radius:16px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;cursor:pointer;position:relative}
.flash-card:active{transform:scale(.98)}
.kana-char{font-size:96px;line-height:1;margin-bottom:8px;transition:all .3s;border-radius:8px}
.kana-reading{font-size:28px;letter-spacing:4px;transition:all .3s;border-radius:6px}
.fc-meta{position:absolute;top:12px;left:16px;font-size:11px;color:#444}
.fc-idx{position:absolute;top:12px;right:16px;font-size:11px;color:#444}
.progress-bar{height:3px;background:#111;border-radius:2px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.flash-controls{display:flex;gap:10px;margin-bottom:10px}
.ctrl-btn{flex:1;padding:12px;background:#111;border:1px solid #333;border-radius:10px;color:#aaa;font-size:13px;cursor:pointer}
.ctrl-btn:active{transform:scale(.97)}
.ctrl-btn.go{background:#001a00;border-color:#0f0;color:#0f0;text-shadow:0 0 6px #0f0}
.ctrl-btn.warn{background:#1a0a00;border-color:#f80;color:#f80}
.toggle-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;justify-content:center;flex-wrap:wrap}
.tlabel{font-size:12px;color:#666;width:100%;text-align:center;margin-bottom:4px}
.vis-btn{padding:7px 14px;background:#111;border:1px solid #333;border-radius:8px;color:#888;font-size:12px;cursor:pointer}
.vis-btn.on{background:#001a1a;border-color:#0cf;color:#0cf}
.gsec{margin-bottom:20px}
.gsec-title{font-size:13px;color:#555;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #222;letter-spacing:2px}
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.kana-cell{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px 4px;text-align:center;cursor:pointer}
.kana-cell:active{transform:scale(.95)}
.kana-cell .ch{font-size:24px;display:block}
.kana-cell .ro{font-size:10px;color:#555;display:block;margin-top:2px;transition:opacity .2s}
.kana-cell.rh .ro{opacity:0}
.theme-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.theme-scroll::-webkit-scrollbar{display:none}
.theme-btn{flex-shrink:0;padding:8px 16px;background:#111;border:1px solid #333;border-radius:20px;color:#888;font-size:12px;cursor:pointer;white-space:nowrap}

/* 단어 플래시카드 */
.word-flash-card{background:#0a0a0a;border:1px solid #222;border-radius:16px;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;position:relative;padding:20px;user-select:none}
.wf-theme{position:absolute;top:12px;left:16px;font-size:11px;color:#444}
.wf-idx{position:absolute;top:12px;right:16px;font-size:11px;color:#444}
.wf-kana{font-size:52px;line-height:1.2;margin-bottom:10px;text-align:center;border-radius:8px;transition:all .2s}
.wf-rom{font-size:18px;letter-spacing:2px;margin-bottom:8px;border-radius:6px;transition:all .2s}
.wf-eng{font-size:16px;margin-bottom:6px;border-radius:6px;transition:all .2s}
.wf-mean{font-size:22px;border-radius:6px;transition:all .2s}
.wf-progress{height:3px;background:#111;border-radius:2px;margin-bottom:12px;overflow:hidden}
.wf-fill{height:100%;border-radius:2px;transition:width .3s}
.word-controls{display:flex;gap:10px;margin-bottom:10px}
.wctrl{flex:1;padding:12px;background:#111;border:1px solid #333;border-radius:10px;color:#aaa;font-size:13px;cursor:pointer}
.wctrl:active{transform:scale(.97)}
.wctrl.go{background:#001a00;border-color:#0f0;color:#0f0;text-shadow:0 0 6px #0f0}
.wctrl.warn{background:#1a0a00;border-color:#f80;color:#f80}
.wctrl.purple{background:#0d001a;border-color:#c0f;color:#c0f}

/* 누르고 있는 동안 가리기 버튼 */
.hold-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.hold-btn{
  padding:14px 8px;
  background:#111;border:1px solid #333;border-radius:10px;
  color:#888;font-size:12px;cursor:pointer;
  text-align:center;line-height:1.4;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
.hold-btn .hb-sub{font-size:10px;color:#555;display:block;margin-top:3px}
.hold-btn:active,.hold-btn.holding,.hold-btn.on{background:#1a0030;border-color:#c0f;color:#c0f;text-shadow:0 0 6px #c0f}
.hold-btn:active .hb-sub,.hold-btn.holding .hb-sub,.hold-btn.on .hb-sub{color:#906}
.hold-hint{text-align:center;font-size:11px;color:#333;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">
<div class="neon-title">カタカナ　マスター</div>
<div class="tab-bar">
  <button class="tab-btn active" id="tb0" onclick="switchTab(0)">플래시카드</button>
  <button class="tab-btn" id="tb1" onclick="switchTab(1)">전체 목록</button>
  <button class="tab-btn" id="tb2" onclick="switchTab(2)">단어 연습</button>
</div>

<!-- 플래시카드 -->
<div id="tab0">
  <div class="mode-bar">
    <button class="mode-btn active" id="ms" onclick="setMode('seq')">순서대로</button>
    <button class="mode-btn" id="mr" onclick="setMode('rand')">랜덤</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%;background:#0ff;box-shadow:0 0 6px #0ff"></div></div>
  <div class="flash-card" onclick="toggleReveal()">
    <span class="fc-meta" id="fcg"></span>
    <span class="fc-idx" id="fci"></span>
    <div class="kana-char" id="fcc"></div>
    <div class="kana-reading" id="fcr"></div>
  </div>
  <div class="toggle-row">
    <span class="tlabel">카드 표시 설정</span>
    <button class="vis-btn on" id="vc" onclick="toggleVis('c')">글자</button>
    <button class="vis-btn on" id="vr" onclick="toggleVis('r')">읽기</button>
  </div>
  <div class="flash-controls">
    <button class="ctrl-btn" onclick="prevCard()">◀ 이전</button>
    <button class="ctrl-btn go" id="ab" onclick="toggleAuto()">▶ 자동</button>
    <button class="ctrl-btn" onclick="nextCard()">다음 ▶</button>
  </div>
  <div class="flash-controls">
    <button class="ctrl-btn warn" onclick="resetCards()">처음으로</button>
    <button class="ctrl-btn" onclick="toggleReveal()" style="flex:2">힌트 보기/가리기</button>
  </div>
</div>

<!-- 목록 -->
<div id="tab1" style="display:none">
  <div class="toggle-row" style="margin-bottom:12px">
    <button class="vis-btn on" id="lrb" onclick="toggleListRom()">읽기 표시</button>
    <button class="vis-btn" onclick="hlRandom()">랜덤 하이라이트</button>
  </div>
  <div id="klc"></div>
</div>

<!-- 단어 연습 -->
<div id="tab2" style="display:none">
  <div class="theme-scroll" id="tscroll"></div>

  <div class="wf-progress"><div class="wf-fill" id="wfill" style="width:0%"></div></div>

  <div class="word-flash-card">
    <span class="wf-theme" id="wftheme"></span>
    <span class="wf-idx" id="wfidx"></span>
    <div class="wf-kana" id="wfkana"></div>
    <div class="wf-rom" id="wfrom"></div>
    <div class="wf-eng" id="wfeng"></div>
    <div class="wf-mean" id="wfmean"></div>
  </div>

  <div class="hold-hint">버튼을 켜면 해당 항목이 숨겨집니다 → 전부 끄면 기본값으로 전체 공개</div>
  <div class="hold-row">
    <button class="hold-btn" id="hb0" onclick="toggleWordHide('kana')">
      カタカナ 숨기기
      <span class="hb-sub">가타카나 단어 숨김</span>
    </button>
    <button class="hold-btn" id="hb1" onclick="toggleWordHide('romaji')">
      로마자 숨기기
      <span class="hb-sub">영문 발음 숨김</span>
    </button>
    <button class="hold-btn" id="hb2" onclick="toggleWordHide('english')">
      영어 숨기기
      <span class="hb-sub">영어 표기 숨김</span>
    </button>
    <button class="hold-btn" id="hb3" onclick="toggleWordHide('meaning')">
      한글 뜻 숨기기
      <span class="hb-sub">한글 뜻 숨김</span>
    </button>
  </div>

  <div class="word-controls">
    <button class="wctrl" onclick="wPrev()">◀ 이전</button>
    <button class="wctrl go" id="wab" onclick="toggleWordAuto()">▶ 자동</button>
    <button class="wctrl" onclick="wNext()">다음 ▶</button>
  </div>
  <div class="word-controls">
    <button class="wctrl warn" onclick="resetWords()">처음으로</button>
    <button class="wctrl purple" onclick="reshuffleWords()">🔀 다시 섞기</button>
  </div>
</div>
</div>

var COLORS=['#0ff','#f0f','#0f0','#ff0','#f80','#08f'];
var allKana=[];
KANA_DATA.forEach(function(g){g.i.forEach(function(item){allKana.push({k:item.k,r:item.r,group:g.g})})});

// ===== 플래시카드 =====
var fc={mode:'seq',idx:0,order:[],auto:false,timer:null,vc:true,vr:true};
function buildOrder(){fc.order=[];for(var i=0;i<allKana.length;i++)fc.order.push(i);if(fc.mode==='rand')fc.order.sort(function(){return Math.random()-0.5})}
function renderFlash(){
  var i=fc.order[fc.idx],kana=allKana[i],col=COLORS[i%COLORS.length];
  var cc=document.getElementById('fcc'),cr=document.getElementById('fcr');
  cc.textContent=kana.k;cr.textContent=kana.r.toUpperCase();
  document.getElementById('fcg').textContent=kana.group;
  document.getElementById('fci').textContent=(fc.idx+1)+'/'+allKana.length;
  document.getElementById('pf').style.width=Math.round((fc.idx+1)/allKana.length*100)+'%';
  if(fc.vc){cc.style.color=col;cc.style.textShadow='0 0 20px '+col+',0 0 40px '+col+'66';cc.style.background='transparent';cc.style.padding='0';}
  else{cc.style.color='transparent';cc.style.textShadow='none';cc.style.background='#1a1a1a';cc.style.padding='8px 24px';}
  if(fc.vr){cr.style.color='#f0f';cr.style.textShadow='0 0 10px #f0f';cr.style.background='transparent';cr.style.padding='0';}
  else{cr.style.color='transparent';cr.style.textShadow='none';cr.style.background='#1a1a1a';cr.style.padding='4px 16px';}
}
function nextCard(){fc.idx=(fc.idx+1)%allKana.length;renderFlash()}
function prevCard(){fc.idx=(fc.idx-1+allKana.length)%allKana.length;renderFlash()}
function resetCards(){fc.idx=0;buildOrder();renderFlash()}
function toggleReveal(){fc.vc=!fc.vc;fc.vr=!fc.vr;document.getElementById('vc').classList.toggle('on',fc.vc);document.getElementById('vr').classList.toggle('on',fc.vr);renderFlash()}
function toggleVis(w){if(w==='c'){fc.vc=!fc.vc;document.getElementById('vc').classList.toggle('on',fc.vc)}else{fc.vr=!fc.vr;document.getElementById('vr').classList.toggle('on',fc.vr)}renderFlash()}
function setMode(m){fc.mode=m;document.getElementById('ms').classList.toggle('active',m==='seq');document.getElementById('mr').classList.toggle('active',m==='rand');fc.idx=0;buildOrder();renderFlash()}
function toggleAuto(){
  fc.auto=!fc.auto;var btn=document.getElementById('ab');
  if(fc.auto){btn.textContent='⏸ 일시정지';btn.style.background='#1a1a00';btn.style.borderColor='#ff0';btn.style.color='#ff0';btn.style.textShadow='0 0 6px #ff0';fc.timer=setInterval(nextCard,2000);}
  else{btn.textContent='▶ 자동';btn.style.background='#001a00';btn.style.borderColor='#0f0';btn.style.color='#0f0';btn.style.textShadow='0 0 6px #0f0';clearInterval(fc.timer);}
}

var listRom=true;
function buildList(){
  var c=document.getElementById('klc');c.innerHTML='';
  KANA_DATA.forEach(function(g){
    var s=document.createElement('div');s.className='gsec';
    s.innerHTML='<div class="gsec-title">'+g.g+'</div>';
    var grid=document.createElement('div');grid.className='kana-grid';
    g.i.forEach(function(item){
      var idx=allKana.findIndex(function(k){return k.k===item.k});
      var col=COLORS[idx%COLORS.length];
      var cell=document.createElement('div');
      cell.className='kana-cell'+(listRom?'':' rh');
      cell.innerHTML='<span class="ch" style="color:'+col+';text-shadow:0 0 8px '+col+'">'+item.k+'</span><span class="ro">'+item.r+'</span>';
      (function(ci){cell.onclick=function(){var oi=fc.order.indexOf(ci);if(oi<0)oi=0;fc.idx=oi;switchTab(0);renderFlash()}})(idx);
      grid.appendChild(cell);
    });
    s.appendChild(grid);c.appendChild(s);
  });
}
function toggleListRom(){listRom=!listRom;document.getElementById('lrb').classList.toggle('on',listRom);document.querySelectorAll('.kana-cell').forEach(function(c){c.classList.toggle('rh',!listRom)})}
function hlRandom(){var cells=document.querySelectorAll('.kana-cell');cells.forEach(function(c){c.style.border='1px solid #222';c.style.boxShadow=''});var p=Math.floor(Math.random()*cells.length);cells[p].style.border='2px solid #ff0';cells[p].style.boxShadow='0 0 12px #ff0';cells[p].scrollIntoView({behavior:'smooth',block:'center'})}

// ===== 단어 플래시카드 =====
var ws={
  theme:'음식',idx:0,order:[],auto:false,timer:null,
  hideKana:false,hideRomaji:false,hideEnglish:false,hideMeaning:false
};

function syncWordHideBtns(){
  document.getElementById('hb0').classList.toggle('on',ws.hideKana);
  document.getElementById('hb1').classList.toggle('on',ws.hideRomaji);
  document.getElementById('hb2').classList.toggle('on',ws.hideEnglish);
  document.getElementById('hb3').classList.toggle('on',ws.hideMeaning);
}
function toggleWordHide(type){
  if(type==='kana') ws.hideKana=!ws.hideKana;
  else if(type==='romaji') ws.hideRomaji=!ws.hideRomaji;
  else if(type==='english') ws.hideEnglish=!ws.hideEnglish;
  else if(type==='meaning') ws.hideMeaning=!ws.hideMeaning;
  syncWordHideBtns();
  renderWord();
}
function resetWordHide(){
  ws.hideKana=false;
  ws.hideRomaji=false;
  ws.hideEnglish=false;
  ws.hideMeaning=false;
  syncWordHideBtns();
}

function buildThemeBtns(){
  var c=document.getElementById('tscroll');c.innerHTML='';
  Object.keys(THEMES).forEach(function(key){
    var t=THEMES[key];
    var btn=document.createElement('button');
    btn.className='theme-btn'+(key===ws.theme?' active':'');
    btn.textContent=t.label;
    btn.style.borderColor=key===ws.theme?t.color:'#333';
    btn.style.color=key===ws.theme?t.color:'#888';
    (function(k){btn.onclick=function(){selectTheme(k)}})(key);
    c.appendChild(btn);
  });
}
function selectTheme(key){
  ws.theme=key;
  var btns=document.querySelectorAll('.theme-btn');
  var keys=Object.keys(THEMES);
  btns.forEach(function(btn,i){
    var k=keys[i],t=THEMES[k],active=k===key;
    btn.classList.toggle('active',active);
    btn.style.borderColor=active?t.color:'#333';
    btn.style.color=active?t.color:'#888';
    btn.style.background=active?'#0a0a0a':'#111';
  });
  reshuffleWords();
}
function getThemeWords(theme){
  var filtered=THEMES[theme].words.filter(function(w){return w.k.indexOf('ー')===-1});
  return filtered.length?filtered:THEMES[theme].words.slice();
}
function reshuffleWords(){
  ws.order=getThemeWords(ws.theme).slice().sort(function(){return Math.random()-0.5});
  ws.idx=0;resetWordHide();renderWord();
}
function resetWords(){ws.idx=0;resetWordHide();renderWord()}
function wNext(){ws.idx=(ws.idx+1)%ws.order.length;renderWord()}
function wPrev(){ws.idx=(ws.idx-1+ws.order.length)%ws.order.length;renderWord()}
function toggleWordAuto(){
  ws.auto=!ws.auto;var btn=document.getElementById('wab');
  if(ws.auto){
    btn.textContent='⏸ 일시정지';btn.style.background='#1a1a00';btn.style.borderColor='#ff0';btn.style.color='#ff0';btn.style.textShadow='0 0 6px #ff0';
    ws.timer=setInterval(function(){wNext()},2500);
  }else{
    btn.textContent='▶ 자동';btn.style.background='#001a00';btn.style.borderColor='#0f0';btn.style.color='#0f0';btn.style.textShadow='0 0 6px #0f0';
    clearInterval(ws.timer);
  }
}

function renderWord(){
  var w=ws.order[ws.idx];
  var tc=THEMES[ws.theme].color;

  // 기본값: 모든 버튼이 꺼져 있으면 전체 공개
  // 버튼을 켜면 숨김 항목이 누적됨
  var showK = !ws.hideKana;
  var showR = !ws.hideRomaji;
  var showO = !ws.hideEnglish;
  var showM = !ws.hideMeaning;

  document.getElementById('wftheme').textContent=THEMES[ws.theme].label;
  document.getElementById('wfidx').textContent=(ws.idx+1)+'/'+ws.order.length;
  document.getElementById('wfill').style.width=Math.round((ws.idx+1)/ws.order.length*100)+'%';
  document.getElementById('wfill').style.background=tc;
  document.getElementById('wfill').style.boxShadow='0 0 6px '+tc;

  var kEl=document.getElementById('wfkana');
  var rEl=document.getElementById('wfrom');
  var oEl=document.getElementById('wfeng');
  var mEl=document.getElementById('wfmean');

  kEl.textContent=w.k;
  if(showK){kEl.style.color=tc;kEl.style.textShadow='0 0 12px '+tc;kEl.style.background='transparent';kEl.style.padding='0';}
  else{kEl.style.color='transparent';kEl.style.textShadow='none';kEl.style.background='#1a1a1a';kEl.style.padding='6px 40px';}

  rEl.textContent=w.r;
  if(showR){rEl.style.color='#666';rEl.style.background='transparent';rEl.style.padding='0';}
  else{rEl.style.color='transparent';rEl.style.background='#1a1a1a';rEl.style.padding='3px 28px';}

  oEl.textContent='← '+w.o;
  if(showO){oEl.style.color='#444';oEl.style.background='transparent';oEl.style.padding='0';}
  else{oEl.style.color='transparent';oEl.style.background='#1a1a1a';oEl.style.padding='3px 24px';}

  mEl.textContent=w.m;
  if(showM){mEl.style.color='#ddd';mEl.style.background='transparent';mEl.style.padding='0';}
  else{mEl.style.color='transparent';mEl.style.background='#1a1a1a';mEl.style.padding='4px 32px';}
}

// ===== 탭 전환 =====
function switchTab(n){
  for(var i=0;i<3;i++){
    document.getElementById('tab'+i).style.display=i===n?'block':'none';
    document.getElementById('tb'+i).classList.toggle('active',i===n);
  }
  if(n===1)buildList();
}

buildThemeBtns();reshuffleWords();
